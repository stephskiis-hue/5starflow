<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>5StarFlow — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#aac7ff",
            "secondary": "#47e266",
            "tertiary": "#e9b3ff",
            "on-surface-variant": "#8b91a0",
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #000000; }
    .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">

  <!-- Background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 left-1/3 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-sm relative">

    <!-- Card -->
    <div class="glass-card rounded-[2rem] p-10">

      <!-- Logo -->
      <div class="text-center mb-8">
        <img src="/images/logo.png" alt="5StarFlow" style="height:56px;width:auto;display:block;margin:0 auto 1.25rem;">
        <h1 class="text-2xl font-black text-zinc-100 tracking-tight">5StarFlow</h1>
        <p class="text-xs text-on-surface-variant mt-1.5 font-medium">Command Center for No-Bs Yardwork</p>
      </div>

      <!-- Error box -->
      <div class="hidden bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 mb-6" id="errorBox">
        <div class="flex items-start gap-2">
          <span class="material-symbols-outlined text-red-400 text-[18px] flex-shrink-0 mt-0.5">error</span>
          <p class="text-sm text-red-400" id="errorText"></p>
        </div>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5" for="email">Email</label>
          <input
            type="email" id="email" name="email"
            placeholder="you@example.com"
            autocomplete="email" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder:text-zinc-600 outline-none focus:border-primary/50 focus:bg-white/8 transition-colors"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5" for="password">Password</label>
          <input
            type="password" id="password" name="password"
            placeholder="••••••••"
            autocomplete="current-password" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder:text-zinc-600 outline-none focus:border-primary/50 focus:bg-white/8 transition-colors"
          />
        </div>
        <button
          type="submit" id="loginBtn"
          class="w-full bg-primary text-zinc-900 rounded-xl py-3 px-4 text-sm font-semibold hover:bg-primary/90 active:bg-primary/80 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed mt-1"
        >Sign In</button>
      </form>

      <!-- Footer -->
      <p class="text-center text-xs text-on-surface-variant mt-6 leading-relaxed">
        Access restricted to licensed users.<br/>Contact support if you need access.
      </p>

    </div>

  </div>

  <script>
    const form     = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const loginBtn = document.getElementById('loginBtn');

    // Show error from URL param (e.g. after redirect)
    const urlErr = new URLSearchParams(window.location.search).get('error');
    if (urlErr) {
      errorText.textContent = decodeURIComponent(urlErr);
      errorBox.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.success && data.redirect) {
          window.location.href = data.redirect;
        } else {
          errorText.textContent = data.error || 'Login failed. Please try again.';
          errorBox.classList.remove('hidden');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errorText.textContent = 'Network error — is the server running?';
        errorBox.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
